# sysctl optimizado para host Proxmox (hipervisor KVM)
# Aplicar con: sysctl -p /etc/sysctl.d/99-proxmox.conf
# o copiando este fichero a /etc/sysctl.d/99-proxmox.conf

# ---- Red ----
# Buffers de red para alto throughput
net.core.rmem_max = 134217728
net.core.wmem_max = 134217728
net.core.rmem_default = 31457280
net.core.wmem_default = 31457280
net.core.netdev_max_backlog = 300000
net.core.somaxconn = 65535

net.ipv4.tcp_rmem = 4096 87380 134217728
net.ipv4.tcp_wmem = 4096 65536 134217728
net.ipv4.tcp_mem = 786432 1048576 26777216

# BBR congestion control (requiere kernel >= 4.9)
net.core.default_qdisc = fq
net.ipv4.tcp_congestion_control = bbr

# TIME_WAIT y reciclado de conexiones
net.ipv4.tcp_tw_reuse = 1
net.ipv4.tcp_fin_timeout = 15
net.ipv4.tcp_max_tw_buckets = 1440000

# Forwarding para VMs/contenedores
net.ipv4.ip_forward = 1
net.ipv6.conf.all.forwarding = 1

# ARP — evitar floods en entornos con muchas VMs
net.ipv4.neigh.default.gc_thresh1 = 4096
net.ipv4.neigh.default.gc_thresh2 = 8192
net.ipv4.neigh.default.gc_thresh3 = 16384

# ---- Memoria / VM ----
# Reducir swap aggressiveness — preferir RAM para KVM
vm.swappiness = 10

# Dirty pages — reducir latencia de escritura a disco
vm.dirty_ratio = 10
vm.dirty_background_ratio = 5
vm.dirty_expire_centisecs = 1500
vm.dirty_writeback_centisecs = 500

# Overcommit — necesario para que KVM pueda reservar memoria de VMs
vm.overcommit_memory = 1

# Hugepages transparentes — dejar en madvise para que KVM las gestione
vm.nr_hugepages = 0

# ---- Kernel / Seguridad ----
kernel.panic = 10
kernel.panic_on_oops = 1

# Aumentar límite de inotify (útil para muchos contenedores)
fs.inotify.max_user_watches = 1048576
fs.inotify.max_user_instances = 512

# Aumentar límite de file descriptors
fs.file-max = 2097152
