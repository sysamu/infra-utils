---
# ── Autodetección de clusters Postgres en ejecución ──────────────────────────

- name: Detect running Postgres clusters via pg_lsclusters
  ansible.builtin.shell: |
    pg_lsclusters --no-header 2>/dev/null | awk '$4 ~ /^(online|running)/ {print $1 ":" $2 ":" $3}'
  register: _pg_clusters_raw
  changed_when: false
  failed_when: false

- name: Set pg_clusters fact (version:name:port) — only running clusters
  ansible.builtin.set_fact:
    pg_clusters: >-
      {{
        _pg_clusters_raw.stdout_lines
        | select('match', '^[0-9]')
        | map('split', ':')
        | map('zip', ['version', 'name', 'port'])
        | map('map', 'reverse')
        | map('community.general.dict')
        | list
      }}

- name: Report detected running clusters
  ansible.builtin.debug:
    msg: "Running Postgres clusters: {{ pg_clusters | map(attribute='version') | zip(pg_clusters | map(attribute='name')) | map('join', '/') | join(', ') if pg_clusters else 'none' }}"

- name: Fail if no running Postgres clusters detected
  ansible.builtin.fail:
    msg: "No running Postgres clusters found — check pg_lsclusters on this host"
  when: pg_clusters | length == 0

# ── Monit (solo si está instalado) ───────────────────────────────────────────

- name: Check if monit is installed
  ansible.builtin.command: which monit
  register: _monit_present
  changed_when: false
  failed_when: false

- name: Deploy monit check for each running Postgres cluster
  ansible.builtin.template:
    src: check_postgres.j2
    dest: "/etc/monit/conf.d/check_postgres_{{ item.version }}_{{ item.name }}"
    owner: root
    group: root
    mode: "0644"
  loop: "{{ pg_clusters }}"
  when: _monit_present.rc == 0
  notify: reload monit

- name: Remove stale monit postgres checks for clusters no longer running
  ansible.builtin.shell: |
    for f in /etc/monit/conf.d/check_postgres_*; do
      [[ -f "$f" ]] || continue
      ver=$(basename "$f" | awk -F_ '{print $3}')
      name=$(basename "$f" | awk -F_ '{print $4}')
      if ! pg_lsclusters --no-header 2>/dev/null | awk '$4~/^(online|running)$/{print $1"/"$2}' | grep -q "^${ver}/${name}$"; then
        rm -f "$f"
        echo "removed $f"
      fi
    done
  register: _stale_pg
  changed_when: "'removed' in _stale_pg.stdout"
  when: _monit_present.rc == 0
  notify: reload monit
