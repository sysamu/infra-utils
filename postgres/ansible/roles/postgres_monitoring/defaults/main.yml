---
# pg_version y pg_port se autodetectan via pg_lsclusters.

# Credenciales — ruta al fichero secreto con PGPASSWORD (permisos 600, root:root)
pg_monit_secret_path: /root/.pg_monit_secret
pg_monit_user: postgres

# Umbrales
pg_lag_crit_seconds: 300          # 5 minutos
pg_locks_crit: 4                  # locks NOT granted
pg_connections_max_total: 200
pg_connections_max_idle: 50
